<!doctype html>
<html>
  <head lang="en">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta
      name="description"
      content="My fourth project in The Odin Project curriculum, an etch-a-sketch app."
    />
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,200..800;1,200..800&family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/images/logo.png" />
    <script defer src="./script.js"></script>
  </head>
  <body>
    <header>
      <nav class="wrapper">
        <div class="left">
          <div class="logo"></div>
          <h1 class="app-name">etch-a-sketch</h1>
        </div>
        <ul class="right">
          <div class="header-buttons">
            <li>
              <button class="theme-toggle">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="theme-toggle-icon"
                >
                  <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                  <path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0"></path>
                  <path d="M12 3l0 18"></path>
                  <path d="M12 9l4.65 -4.65"></path>
                  <path d="M12 14.3l7.37 -7.37"></path>
                  <path d="M12 19.6l8.85 -8.85"></path>
                </svg>
              </button>
            </li>
            <li>
              <button class="menu-button">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="menu-icon"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
                  />
                </svg>
              </button>
            </li>
          </div>
        </ul>
      </nav>
    </header>
    <main class="wrapper">
      <div class="app-wrapper">
        <div class="primary-buttons-wrapper">
          <button id="set-grid-size-btn">Set grid size</button>
          <button id="clear-grid-btn">Clear grid</button>
        </div>
        <p class="grid-size">Grid size: <span>16x16</span></p>
        <div class="grid"></div>
      </div>
    </main>
    <footer>
      Made by
      <a
        class="developer"
        href="https://github.com/arvingarciabtw/the-odin-project"
        target="_blank"
        rel="noopener noreferrer"
        >@arvingarciabtw</a
      >
    </footer>
    <div class="modal">
      <button class="close-modal-button" aria-label="Close modal">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          class="close-modal-icon"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M6 18 18 6M6 6l12 12"
          />
        </svg>
      </button>
      <ul>
        <li><a href="/index.html">Home</a></li>
      </ul>
    </div>
    <div class="set-grid-size-modal">
      <div class="overlay"></div>
      <div class="content">
        <form id="grid-size-form">
          <div class="input-wrapper">
            <label for="">Grid Size</label>
            <input
              id="grid-size-input"
              type="text"
              required
              title="Enter a number between 16 and 100"
              pattern="^(1[6-9]|[2-9][0-9]|100)$"
            />
          </div>
          <div class="buttons-wrapper">
            <button id="close-grid-size-modal">Close</button>
            <button>Submit</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
