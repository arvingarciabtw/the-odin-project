<!doctype html>
<html>
  <head lang="en">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta
      name="description"
      content="My sixth project in The Odin Project curriculum, a UI of a sign-up form."
    />
    <title>Sign-up Form</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,200..800;1,200..800&family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/images/logo.png" />
    <script defer src="./script.js"></script>
  </head>
  <body>
    <main>
      <button class="theme-toggle">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="theme-toggle-icon"
        >
          <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
          <path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0"></path>
          <path d="M12 3l0 18"></path>
          <path d="M12 9l4.65 -4.65"></path>
          <path d="M12 14.3l7.37 -7.37"></path>
          <path d="M12 19.6l8.85 -8.85"></path>
        </svg>
      </button>
      <div class="hero">
        <div class="banner">
          <div class="logo"></div>
          <h1 class="heading">odin</h1>
        </div>
      </div>
      <div class="content">
        <div class="description-wrapper">
          <p>
            This is not a real online service! You know you need something like
            this in your life to help you realize your deepest dreams. Sign up
            <i>now</i> to get started.
          </p>
          <p>You <i>know</i> you want to.</p>
        </div>
        <div class="form-wrapper">
          <form id="form">
            <h1 class="form-heading">Sign up</h1>
            <div class="form-inputs">
              <div class="first-name-wrapper">
                <label for="first-name">First Name</label>
                <input
                  type="text"
                  name="first-name"
                  id="first-name"
                  placeholder="Odin"
                />
              </div>
              <div class="last-name-wrapper">
                <label for="last-name">Last Name</label>
                <input
                  type="text"
                  name="last-name"
                  id="last-name"
                  placeholder="Borrson"
                />
              </div>
              <div class="email-wrapper">
                <label for="email">Email</label>
                <input
                  type="email"
                  name="email"
                  id="email"
                  placeholder="odinborrson@odin.com"
                />
              </div>
              <div class="phone-number-wrapper">
                <label for="phone-number">Phone Number</label>
                <input
                  type="tel"
                  pattern="\+63\s\d{3}\s\d{3}\s\d{4}"
                  placeholder="+63 111 222 3333"
                  title="Please match the format: +63 111 222 3333"
                  name="phone-number"
                  id="phone-number"
                />
              </div>
              <div class="password-wrapper">
                <label for="password">Password (*)</label>
                <input
                  required
                  type="password"
                  name="password"
                  id="password"
                  placeholder=""
                />
              </div>
              <div class="confirm-password-wrapper">
                <label for="confirm-password">Confirm Password (*)</label>
                <input
                  required
                  type="password"
                  name="confirm-password"
                  id="confirm-password"
                  placeholder=""
                />
              </div>
            </div>
          </form>
        </div>
        <div class="cta-wrapper">
          <button class="cta-button" type="submit" form="form">
            Create account
          </button>
          <p class="cta-redirect">
            Already have an account?
            <span>Sign in</span>
          </p>
        </div>
      </div>
    </main>
  </body>
</html>
